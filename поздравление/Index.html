<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>С Днём Рождения, Сестрёнка! ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff9a9e 0%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .phone-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 900px;
            background: rgba(255, 240, 245, 0.3);
            backdrop-filter: blur(2px);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 2;
            pointer-events: auto;
        }
    </style>
</head>
<body>
<div class="phone-container">
    <canvas id="birthdayCanvas" width="450" height="800"></canvas>
</div>

<script>
    (function(){
        const canvas = document.getElementById('birthdayCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const STATE = { Q1: 0, Q2: 1, FINAL: 2 };
        let currentState = STATE.Q1;
        let explosionStarted = false;
        let explosionParticles = [];
        let heartFormed = false;
        
        let loveWords = [];      
        const LOVE_WORDS_COUNT = 90;
        
        function initLoveWords() {
            const words = [];
            for (let i = 0; i < LOVE_WORDS_COUNT; i++) {
                let startAngle = (i / LOVE_WORDS_COUNT) * Math.PI * 2;
                words.push({
                    text: "I love you",     
                    angle: startAngle,
                    speed: 0.003,
                    size: 14 + Math.sin(i) * 1.5,
                    opacity: 0.85,
                    hue: 330 + (Math.sin(i) * 15)
                });
            }
            return words;
        }
        
        function getHeartPoint(t, scale, centerX, centerY) {
            let xRaw = 16 * Math.pow(Math.sin(t), 3);
            let yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            let x = xRaw * scale + centerX;
            let y = -yRaw * scale + centerY;
            return { x, y };
        }
        
        function updateLoveWords() {
            if (!heartFormed) return;
            for (let w of loveWords) {
                w.angle += w.speed;
                if (w.angle > Math.PI * 2) w.angle -= Math.PI * 2;
            }
        }
        
        function drawLoveWords() {
            if (!heartFormed) return;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 + 10;
            const scale = Math.min(canvas.width, canvas.height) / 43;
            for (let w of loveWords) {
                let pos = getHeartPoint(w.angle, scale, centerX, centerY);
                ctx.save();
                ctx.font = `${w.size}px 'Comic Neue', 'Segoe UI', 'Comic Sans MS', cursive`;
                ctx.shadowBlur = 3;
                ctx.shadowColor = "rgba(255,100,150,0.5)";
                ctx.fillStyle = `hsla(${w.hue}, 85%, 62%, ${w.opacity})`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(w.text, pos.x, pos.y);
                ctx.restore();
            }
        }
        
        function drawCenterBirthdayText() {
            if (!heartFormed) return;
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.font = `bold ${Math.min(26, canvas.width/12)}px 'Comic Neue', cursive`;
            ctx.fillStyle = "#ffffffcc";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("С Днём Рождения,", canvas.width/2, canvas.height/2 - 18);
            ctx.fillStyle = "#ffffffcc";
            ctx.fillText("Сестрёнка! 🎂", canvas.width/2, canvas.height/2 + 22);
            ctx.font = `bold ${Math.min(26, canvas.width/12)}px 'Comic Neue', cursive`;
            ctx.fillStyle = "#c2185b";
            ctx.fillText("С Днём Рождения,", canvas.width/2, canvas.height/2 - 20);
            ctx.font = `bold ${Math.min(28, canvas.width/11)}px 'Comic Neue'`;
            ctx.fillStyle = "#ad1457";
            ctx.fillText("Сестрёнка! 🎂", canvas.width/2, canvas.height/2 + 20);
            ctx.font = `24px 'Segoe UI Emoji'`;
            ctx.fillStyle = "#ff4d6d";
            ctx.fillText("❤️ 🎈 🎁", canvas.width/2, canvas.height/2 + 65);
            ctx.restore();
        }
        
        let floatingItems = [];
        const FLOAT_COUNT = 20;
        
        function initFloating() {
            for (let i = 0; i < FLOAT_COUNT; i++) {
                floatingItems.push({
                    type: Math.random() < 0.6 ? 'heart' : 'cake',
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 18 + Math.random() * 28,
                    speedX: (Math.random() - 0.5) * 1.1,
                    speedY: (Math.random() - 0.5) * 1.1 + 0.3,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.04,
                    opacity: 0.6 + Math.random() * 0.4
                });
            }
        }
        
        function updateFloating() {
            for (let item of floatingItems) {
                item.x += item.speedX;
                item.y += item.speedY;
                item.rotation += item.rotSpeed;
                if (item.x < -50) item.x = canvas.width + 40;
                if (item.x > canvas.width + 50) item.x = -40;
                if (item.y < -50) item.y = canvas.height + 40;
                if (item.y > canvas.height + 50) item.y = -40;
            }
        }
        
        function drawHeartShape(ctx, x, y, r) {
            ctx.beginPath();
            ctx.moveTo(x, y + r * 0.8);
            ctx.bezierCurveTo(x, y + r * 0.8, x - r * 1.2, y - r * 0.2, x, y - r * 1.2);
            ctx.bezierCurveTo(x + r * 1.2, y - r * 0.2, x, y + r * 0.8, x, y + r * 0.8);
            ctx.fill();
        }
        
        function drawFloating() {
            for (let item of floatingItems) {
                ctx.save();
                ctx.translate(item.x, item.y);
                ctx.rotate(item.rotation);
                ctx.globalAlpha = item.opacity;
                if (item.type === 'heart') {
                    ctx.fillStyle = `rgba(255, 70, 110, ${0.7 + Math.sin(Date.now() * 0.004 + item.x) * 0.2})`;
                    drawHeartShape(ctx, 0, 0, item.size / 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = "#f3b45a";
                    ctx.beginPath();
                    ctx.rect(-item.size/3, -item.size/4, item.size*0.66, item.size*0.45);
                    ctx.fill();
                    ctx.fillStyle = "#e5984f";
                    ctx.beginPath();
                    ctx.rect(-item.size/3.5, -item.size/3, item.size*0.57, item.size*0.27);
                    ctx.fill();
                    ctx.fillStyle = "#ff7b7b";
                    ctx.beginPath();
                    ctx.arc(0, -item.size/4.5, item.size/6.5, 0, Math.PI*2);
                    ctx.fill();
                    for(let s=0; s<3; s++) {
                        ctx.fillStyle = "#f7d44a";
                        ctx.beginPath();
                        ctx.rect(-item.size/5 + s*item.size/5.5, -item.size/5, item.size/14, item.size/14);
                        ctx.fill();
                    }
                }
                ctx.restore();
            }
        }
        
        function startExplosion() {
            explosionStarted = true;
            explosionParticles = [];
            for (let i = 0; i < 350; i++) {
                explosionParticles.push({
                    x: canvas.width/2,
                    y: canvas.height/2,
                    vx: (Math.random() - 0.5) * 18,
                    vy: (Math.random() - 0.5) * 16 - 5,
                    life: 1,
                    size: 4 + Math.random() * 14,
                    color: `hsl(${Math.random() * 360}, 85%, 65%)`,
                    isHeart: Math.random() > 0.65
                });
            }
        }
        
        function updateExplosion() {
            if (!explosionStarted) return false;
            let allDead = true;
            for (let i = 0; i < explosionParticles.length; i++) {
                let p = explosionParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.24;
                p.life -= 0.025;
                if (p.life <= 0) {
                    explosionParticles.splice(i,1);
                    i--;
                } else {
                    allDead = false;
                }
            }
            if (allDead && explosionStarted) {
                explosionStarted = false;
                heartFormed = true;
                loveWords = initLoveWords();
                return true;
            }
            return false;
        }
        
        function drawExplosion() {
            for (let p of explosionParticles) {
                ctx.globalAlpha = p.life;
                if (p.isHeart) {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    drawHeartShape(ctx, p.x, p.y, p.size/1.8);
                    ctx.fill();
                } else {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
        }
        
        function handleCanvasInteraction(e) {
            if (currentState === STATE.FINAL) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            
            if (currentState === STATE.Q1) {
                let btnW = 150, btnH = 54;
                let btnX = canvas.width/2 - btnW/2;
                let btnY = canvas.height - 100;
                if (canvasX > btnX && canvasX < btnX+btnW && canvasY > btnY && canvasY < btnY+btnH) {
                    currentState = STATE.Q2;
                }
            }
            else if (currentState === STATE.Q2) {
                let btnW = 180, btnH = 54;
                let btnX = canvas.width/2 - btnW/2;
                let btnY = canvas.height - 100;
                if (canvasX > btnX && canvasX < btnX+btnW && canvasY > btnY && canvasY < btnY+btnH) {
                    currentState = STATE.FINAL;
                    startExplosion();
                    const audio = new Audio('song.mp3');
                    audio.loop = true;
                    audio.volume = 0.7;
                    audio.play().catch(() => {});
                }
            }
        }
        
        function drawUI() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFloating();
            
            if (currentState === STATE.Q1) {
                ctx.font = `bold ${Math.min(34, canvas.width/9)}px 'Comic Neue'`;
                ctx.fillStyle = "#c44569";
                ctx.textAlign = "center";
                ctx.fillText("❓ А что у вас на носу? ❓", canvas.width/2, canvas.height/2 - 60);
                ctx.fillStyle = "#ff90b5";
                ctx.beginPath();
                ctx.roundRect(canvas.width/2 - 75, canvas.height - 100, 150, 54, 30);
                ctx.fill();
                ctx.fillStyle = "#a13055";
                ctx.font = "bold 28px 'Comic Neue'";
                ctx.fillText("Сопля?", canvas.width/2, canvas.height - 73);
            } 
            else if (currentState === STATE.Q2) {
                ctx.font = `bold ${Math.min(36, canvas.width/8.5)}px 'Comic Neue'`;
                ctx.fillStyle = "#e67e22";
                ctx.fillText("🎉 Нет, День рождения! 🎉", canvas.width/2, canvas.height/2 - 60);
                ctx.fillStyle = "#ffaa66";
                ctx.beginPath();
                ctx.roundRect(canvas.width/2 - 90, canvas.height - 100, 180, 54, 30);
                ctx.fill();
                ctx.fillStyle = "#7b3f00";
                ctx.font = "bold 26px 'Comic Neue'";
                ctx.fillText("Понял, взрывай!", canvas.width/2, canvas.height - 73);
            }
            else if (currentState === STATE.FINAL) {
                if (explosionStarted) {
                    drawExplosion();
                    if (!heartFormed) {
                        ctx.font = "bold 46px 'Comic Neue'";
                        ctx.fillStyle = "white";
                        ctx.shadowBlur = 14;
                        ctx.fillText("💥 БАХ! 💥", canvas.width/2, canvas.height/2);
                    }
                }
                if (heartFormed) {
                    drawLoveWords();
                    drawCenterBirthdayText();
                }
            }
            
            if (currentState !== STATE.FINAL && !heartFormed) {
                ctx.font = "16px monospace";
                ctx.fillStyle = "#8b4c5e";
                ctx.fillText("👇 нажми на кнопку 👇", canvas.width/2, canvas.height - 30);
            }
        }
        
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2*r) r = w/2;
                if (h < 2*r) r = h/2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        canvas.addEventListener('click', handleCanvasInteraction);
        canvas.addEventListener('touchstart', (e) => {
            handleCanvasInteraction(e);
            e.preventDefault();
        });
        
        let animFrame;
        function animate() {
            updateFloating();
            if (currentState === STATE.FINAL && explosionStarted) {
                updateExplosion();
            }
            if (heartFormed) {
                updateLoveWords();
            }
            drawUI();
            animFrame = requestAnimationFrame(animate);
        }
        
        initFloating();
        resizeCanvas();
        animate();
    })();
</script>
</body>
</html>
